<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Cart</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
    }

    .container {
        display: flex;
        gap: 20px;
    }

    .books, .cart {
        background: white;
        padding: 20px;
        border-radius: 10px;
        width: 50%;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .book {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        padding: 10px;
        border-bottom: 1px solid #ddd;
    }

    button {
        background: #007bff;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    .cart-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    .total {
        font-weight: bold;
        margin-top: 20px;
        text-align: right;
    }
</style>
</head>
<body>

<h1>📚 Book Store Cart</h1>

<div class="container">
    <!-- Book List -->
    <div class="books">
        <h2>Available Books</h2>
        <div id="bookList"></div>
    </div>

    <!-- Cart -->
    <div class="cart">
        <h2>Your Cart</h2>
        <div id="cartItems"></div>
        <div class="total">Total: ₹<span id="total">0</span></div>
    </div>
</div>

<script>
    const books = [
        { id: 1, name: "JavaScript Basics", price: 299 },
        { id: 2, name: "HTML & CSS Guide", price: 199 },
        { id: 3, name: "React for Beginners", price: 399 },
        { id: 4, name: "Node.js Mastery", price: 499 }
    ];

    let cart = [];

    const bookList = document.getElementById("bookList");
    const cartItems = document.getElementById("cartItems");
    const totalEl = document.getElementById("total");

    function renderBooks() {
        bookList.innerHTML = "";
        books.forEach(book => {
            const div = document.createElement("div");
            div.className = "book";
            div.innerHTML = `
                <span>${book.name} - ₹${book.price}</span>
                <button onclick="addToCart(${book.id})">Add</button>
            `;
            bookList.appendChild(div);
        });
    }

    function addToCart(id) {
        const book = books.find(b => b.id === id);
        cart.push(book);
        renderCart();
    }

    function removeFromCart(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function renderCart() {
        cartItems.innerHTML = "";
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            const div = document.createElement("div");
            div.className = "cart-item";
            div.innerHTML = `
                <span>${item.name} - ₹${item.price}</span>
                <button onclick="removeFromCart(${index})">X</button>
            `;
            cartItems.appendChild(div);
        });

        totalEl.textContent = total;
    }

    renderBooks();
</script>

</body>
</html>
